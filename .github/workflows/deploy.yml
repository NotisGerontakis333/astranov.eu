name: Deploy

on:
  push:
    branches: [main]

jobs:
  supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --project-ref kzlabcrlrpbnfiiyrjvl

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in vendor-crawler order-intake debug-write debug-reader ai-router astranov-api; do
            supabase functions deploy $fn --project-ref kzlabcrlrpbnfiiyrjvl --no-verify-jwt || true
          done

  cloudflare:
    runs-on: ubuntu-latest
    needs: supabase
    steps:
      - name: Purge Cloudflare cache
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=astranov.eu" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')" 2>/dev/null)
          if [ -n "$ZONE_ID" ]; then
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
            echo "Cache purged for zone $ZONE_ID"
          else
            echo "Zone ID not found — skipping purge"
          fi
