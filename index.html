<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>AstranoV — The Global Operating System</title>
<meta name="theme-color" content="#020a1c" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-180.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" />

<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" />
<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root { --t-quick: 0.18s; --ease: cubic-bezier(0.32, 0.72, 0, 1); }
  html, body { margin: 0; padding: 0; height: 100%; background: #010615; overflow: hidden;
    color: #cde7ff; font-family: 'Quicksand', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { position: fixed; inset: 0; }

  #cesiumContainer { position: absolute; inset: 0; }
  .cesium-widget-credits, .cesium-viewer-bottom { display: none !important; }

  /* WORDMARK — always visible. Deep electric blue glow, no chrome. */
  #app-name {
    position: fixed; top: max(10px, env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%); z-index: 200; cursor: pointer;
    font-weight: 700; font-size: 21px; letter-spacing: 0.34em; text-indent: 0.34em;
    color: #cde7ff; user-select: none;
    text-shadow: 0 0 4px #ffffff, 0 0 10px #4aa6ff, 0 0 22px #1e6cff,
                 0 0 40px #0040d8, 0 0 70px #001a66;
    transition: transform var(--t-quick) var(--ease);
  }
  #app-name:active { transform: translateX(-50%) scale(0.96); }

  /* BOOT — minimal loader. */
  #boot { position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at 50% 45%, #04122e 0%, #020a1c 55%, #010615 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s ease; }
  #boot.gone { opacity: 0; pointer-events: none; display: none !important; }
  #boot .loader { width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(74,166,255,0.18); border-top-color: #4aa6ff;
    box-shadow: 0 0 14px rgba(74,166,255,0.45);
    animation: spin 0.95s linear infinite; margin-bottom: 22px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #boot .name { font-weight: 700; font-size: 21px; letter-spacing: 0.34em; text-indent: 0.34em;
    color: #cde7ff; text-shadow: 0 0 4px #ffffff, 0 0 10px #4aa6ff, 0 0 22px #1e6cff,
                                  0 0 40px #0040d8, 0 0 70px #001a66; }

  /* CHAT — bottom drawer, slides up. Mostly perimeter. */
  #chat { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    max-height: 60vh; display: flex; flex-direction: column;
    background: linear-gradient(180deg, rgba(8,18,38,0.32), rgba(2,6,18,0.46));
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border-top: 1px solid rgba(93,178,255,0.55); border-radius: 22px 22px 0 0;
    box-shadow: 0 -10px 28px rgba(45,108,196,0.18),
                inset 0 1px 0 rgba(207,226,255,0.18);
    transform: translateY(100%); transition: transform 0.4s var(--ease);
    overflow: hidden; }
  #chat.open { transform: translateY(0); }
  #chat-handle { padding: 8px 14px; display: flex; align-items: center; justify-content: center;
    gap: 10px; cursor: grab; user-select: none; }
  #chat-handle::before { content: ''; width: 36px; height: 4px; border-radius: 2px;
    background: rgba(120,180,255,0.35); }
  #chat-msgs { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 16px 8px;
    -webkit-overflow-scrolling: touch; }
  #chat-msgs:empty { display: none; }
  .msg { margin-bottom: 10px; padding: 9px 13px; border-radius: 14px;
    max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
  .msg.ai   { background: rgba(255,255,255,0.04); }
  .msg.user { background: rgba(120,180,255,0.12); margin-left: auto; }
  #chat-form { display: flex; gap: 10px; padding: 10px 14px calc(12px + env(safe-area-inset-bottom));
    align-items: center; }
  #chat-input { flex: 1; min-width: 0; padding: 10px 14px; font-size: 16px;
    background: rgba(8,18,38,0.55); border: 1px solid rgba(93,178,255,0.40);
    border-radius: 22px; color: #e8eef8; outline: none; }
  #chat-input:focus { border-color: rgba(93,178,255,0.85); box-shadow: 0 0 12px rgba(45,108,196,0.4); }
  .btn { width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    background: rgba(8,18,38,0.55); border: 1px solid rgba(93,178,255,0.5);
    color: #cde7ff; font-size: 16px; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: transform 0.12s var(--ease); }
  .btn:active { transform: scale(0.92); }
  .btn.primary { background: rgba(20,52,120,0.75); border-color: rgba(93,178,255,0.9);
    box-shadow: 0 0 12px rgba(45,108,196,0.55); }
  .btn.listening { border-color: #7eebb4; color: #7eebb4;
    box-shadow: 0 0 14px rgba(126,235,180,0.7); }

  /* CHAT RE-OPEN — bottom tab when chat is closed. */
  #chat-reopen { position: fixed; left: 50%; transform: translateX(-50%);
    bottom: max(10px, calc(env(safe-area-inset-bottom) + 10px)); z-index: 200;
    width: 64px; height: 22px; cursor: pointer;
    background: radial-gradient(circle at 50% 50%, rgba(74,166,255,0.35) 0%,
                                                    rgba(30,108,255,0.18) 45%,
                                                    rgba(0,26,102,0) 70%);
    border-radius: 12px 12px 0 0;
    border-top: 1px solid rgba(74,166,255,0.55);
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3px;
    transition: opacity 0.25s var(--ease); }
  #chat-reopen::after { content: '◈'; color: #cde7ff; font-size: 13px;
    text-shadow: 0 0 6px #4aa6ff, 0 0 14px #1e6cff; }
  body.chat-open #chat-reopen { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!--
================================================================================
ASTRANOV — minimal scaffold after architect-ordered nuke (2026-06-05).
Architect: Notis Astranov. Per CLAUDE.md §1, the architect's order
overrides every other clause. Full pre-nuke state at git tag
'pre-nuke-2026-06-05-1202' (16,127 lines). Recoverable with:
   git checkout pre-nuke-2026-06-05-1202 -- index.html
This scaffold: globe + wordmark + AI chat wired to /aicycle. ~250 lines.
The architect grows it from here, surface by surface, on their terms.
================================================================================
-->

<div id="cesiumContainer"></div>

<div id="app-name" onclick="location.reload(true)" title="AstranoV — tap to reload">ASTRANOV</div>

<div id="boot">
  <div class="loader"></div>
  <div class="name">ASTRANOV</div>
</div>

<div id="chat-reopen" title="Open Astranov"></div>

<div id="chat">
  <div id="chat-handle"></div>
  <div id="chat-msgs"></div>
  <form id="chat-form" autocomplete="off">
    <button id="btn-mic" type="button" class="btn" title="Speak" aria-label="Microphone">🎙</button>
    <input id="chat-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
      enterkeyhint="send" placeholder="Speak or type…" />
    <button id="btn-send" type="submit" class="btn primary" title="Send" aria-label="Send">↑</button>
  </form>
</div>

<script>
'use strict';

const SUPABASE_URL = 'https://lkoatrkhuigdolnjsbie.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxrb2F0cmtodWlnZG9sbmpzYmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTQ5NjUsImV4cCI6MjA5NDQzMDk2NX0.6Ji5y_WTMSpKDF5wkX9c4Yj76OuhVTcSvKK4xUDeFKw';

const $ = (id) => document.getElementById(id);

/* ---------- Cesium ---------- */
let viewer = null;
async function bootCesium() {
  try {
    viewer = new Cesium.Viewer('cesiumContainer', {
      animation: false, baseLayerPicker: false, fullscreenButton: false,
      vrButton: false, geocoder: false, homeButton: false, infoBox: false,
      sceneModePicker: false, selectionIndicator: false, timeline: false,
      navigationHelpButton: false, requestRenderMode: true,
      maximumRenderTimeChange: Infinity, baseLayer: false, scene3DOnly: false,
      skyAtmosphere: new Cesium.SkyAtmosphere(), msaaSamples: 1,
    });
    if (viewer.cesiumWidget?.creditContainer) viewer.cesiumWidget.creditContainer.style.display = 'none';
    viewer.scene.globe.enableLighting = false;
    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');
    try { viewer.scene.globe.dynamicAtmosphereLighting = false; } catch (_) {}
    try { if (viewer.scene.postProcessStages.fxaa) viewer.scene.postProcessStages.fxaa.enabled = false; } catch (_) {}
    try { viewer.scene.fog.enabled = false; } catch (_) {}
    const cc = viewer.scene.screenSpaceCameraController;
    cc.minimumZoomDistance = 5; cc.maximumZoomDistance = 2_000_000_000;
    viewer.resolutionScale = Math.min(1.25, window.devicePixelRatio || 1);
    viewer.scene.globe.maximumScreenSpaceError = 2.0;
    viewer.scene.globe.preloadSiblings = false;
    const base = await Cesium.TileMapServiceImageryProvider.fromUrl(
      Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
    );
    viewer.imageryLayers.addImageryProvider(base);
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(20, 35, 28_000_000),
      duration: 0,
    });
    viewer.scene.requestRender();
    // Dismiss boot on first paint.
    let hidden = false;
    const hide = () => { if (hidden) return; hidden = true; $('boot').classList.add('gone'); };
    try {
      const off = viewer.scene.postRender.addEventListener(() => {
        hide(); try { viewer.scene.postRender.removeEventListener(off); } catch (_) {}
      });
    } catch (_) { hide(); }
    setTimeout(hide, 1500);
  } catch (e) {
    console.error('[Cesium]', e);
    $('boot').classList.add('gone');
  }
}

/* ---------- Supabase ---------- */
let sb = null, session = null;
function bootSupabase() {
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    sb.auth.getSession().then(({ data }) => { session = data.session; });
    sb.auth.onAuthStateChange((_e, s) => { session = s; });
  } catch (e) { console.error('[Supabase]', e); }
}

/* ---------- Chat ---------- */
const aicycleHistory = [];
function openChat() { $('chat').classList.add('open'); document.body.classList.add('chat-open'); }
function closeChat() { $('chat').classList.remove('open'); document.body.classList.remove('chat-open'); }
function appendMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  const msgs = $('chat-msgs');
  const nearBottom = (msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight) < 80;
  msgs.appendChild(div);
  if (nearBottom) msgs.scrollTop = msgs.scrollHeight;
}

async function callBrain(prompt) {
  if (!sb) return '(offline)';
  const history = aicycleHistory.slice(-6);
  try {
    const { data, error } = await sb.functions.invoke('aicycle', {
      body: { prompt, history, engine: 'astranov' },
    });
    if (error) throw error;
    const reply = (data && (data.response || data.text)) || '(no reply)';
    aicycleHistory.push({ role: 'user', content: prompt });
    aicycleHistory.push({ role: 'assistant', content: reply });
    return reply;
  } catch (e) { return '(error: ' + (e.message || e) + ')'; }
}

$('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = $('chat-input');
  const text = input.value.trim();
  if (!text) return;
  appendMsg('user', text);
  input.value = '';
  const reply = await callBrain(text);
  appendMsg('ai', reply);
});

$('chat-reopen').addEventListener('click', openChat);

/* ---------- Voice (manual opt-in) ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, listening = false;
if (SR) {
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = navigator.language || 'en-US';
  recognition.onresult = (evt) => {
    const t = evt.results?.[0]?.[0]?.transcript?.trim();
    if (t) { $('chat-input').value = t; $('chat-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true })); }
  };
  recognition.onend = () => { listening = false; $('btn-mic').classList.remove('listening'); };
  recognition.onerror = () => { listening = false; $('btn-mic').classList.remove('listening'); };
}
$('btn-mic').addEventListener('click', () => {
  if (!recognition) return;
  if (listening) { try { recognition.stop(); } catch (_) {} listening = false; $('btn-mic').classList.remove('listening'); return; }
  try { recognition.start(); listening = true; $('btn-mic').classList.add('listening'); } catch (_) {}
});

/* ---------- Chat drag handle (drag down to close) ---------- */
(function () {
  const h = $('chat-handle'); if (!h) return;
  let startY = 0, startH = 0, dragging = false;
  h.addEventListener('pointerdown', (e) => {
    h.setPointerCapture(e.pointerId);
    startY = e.clientY; startH = $('chat').getBoundingClientRect().height; dragging = true;
  });
  h.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newH = Math.max(60, Math.min(window.innerHeight * 0.6, startH + delta));
    $('chat').style.maxHeight = newH + 'px';
  });
  h.addEventListener('pointerup', (e) => {
    dragging = false; try { h.releasePointerCapture(e.pointerId); } catch (_) {}
    if ($('chat').getBoundingClientRect().height < 80) closeChat();
  });
})();

/* ---------- Boot ---------- */
window.addEventListener('load', () => {
  bootCesium();
  bootSupabase();
  // Open the chat with a greeting after a short pause.
  setTimeout(() => {
    openChat();
    const h = new Date().getHours();
    const tod = h < 5 ? 'Up late' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    appendMsg('ai', tod + ". I'm Astranov. Ask me anything.");
  }, 1400);
});

// Escape closes chat.
window.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (document.activeElement?.tagName === 'INPUT') { document.activeElement.blur(); return; }
  if ($('chat').classList.contains('open')) closeChat();
});
</script>
</body>
</html>
