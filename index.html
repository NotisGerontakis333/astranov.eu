<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRANOV • Global Internet Operating System • Our Mind</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
  body {
    background: linear-gradient(to bottom, #0a0a2e, #000000), url('https://picsum.photos/id/1015/1920/1080') center/cover;
    background-blend-mode: multiply;
    font-family: 'Inter', sans-serif;
    color: white;
    overflow: hidden;
  }
  .logo { font-family: 'Orbitron', sans-serif; font-size: 4.8rem; letter-spacing: 0.5em; text-shadow: 0 0 80px #67e8f9; }
</style>
</head>
<body class="min-h-screen relative">
  <div class="absolute inset-0 bg-[radial-gradient(at_center,#ffffff10_1px,transparent_1px)] bg-[length:50px_50px] pointer-events-none"></div>

  <!-- Top Bar -->
  <header class="flex justify-between items-center px-8 py-3 border-b border-white/20 bg-black/40 backdrop-blur">
    <h1 onclick="resetOS()" class="logo text-cyan-300 cursor-pointer tracking-widest">ASTRANOV OS</h1>
    <div class="flex items-center gap-6 text-sm">
      <div class="px-4 py-1 bg-emerald-500/30 border border-emerald-400 rounded-full">1 ALIVE • OUR MIND • v3.0 GLOBAL</div>
      <button onclick="activatePilot()" class="px-6 py-1.5 bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-bold rounded-full">PILOT • 300 DRONES ACTIVE</button>
    </div>
  </header>

  <!-- Central Globe Desktop -->
  <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/3 w-[580px] h-[580px] rounded-full border-8 border-cyan-400/30 shadow-2xl shadow-cyan-500 flex items-center justify-center text-9xl cursor-grab" style="background: conic-gradient(#22d3ee, #67e8f9, #a855f7, #22d3ee);">
    🌍
    <div class="absolute text-center">
      <div class="text-2xl font-bold text-white drop-shadow">DRAG ME • INTERACTIVE EARTH</div>
      <div class="text-xs text-cyan-300">87 SATELLITES • LIVE CRAWLER DATA • DRONES PATROLLING</div>
    </div>
  </div>

  <!-- Floating Windows -->
  <div class="absolute top-24 left-8 bg-zinc-900/90 border border-cyan-400 w-80 rounded-2xl p-4 shadow-xl">
    <h3 class="font-bold flex justify-between"><span>🌐 INTERNET CRAWLERS</span><button onclick="populate()" class="text-xs bg-emerald-600 px-3">POPULATE GLOBE</button></h3>
    <p class="text-xs text-emerald-400">Live preference-based data streaming • 142 new points added</p>
  </div>

  <div class="absolute top-64 right-8 bg-zinc-900/90 border border-rose-400 w-72 rounded-2xl p-4">
    <h3>🛵 DELIVERY MARKETPLACE • 23 ACTIVE</h3>
    <button class="mt-3 w-full py-3 bg-rose-500">DISPATCH DRONE DELIVERY</button>
  </div>

  <!-- Pilot Panel -->
  <div onclick="activatePilot()" class="absolute bottom-32 right-12 bg-gradient-to-br from-cyan-400 to-blue-600 text-black font-bold p-6 rounded-3xl text-center shadow-2xl cursor-pointer">
    🚁 PILOT COMMAND CENTER<br>
    <span class="text-xl">300 DRONES • FULL CONTROL</span>
  </div>

  <input class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[520px] bg-zinc-900 border-2 border-white/50 rounded-full px-6 py-5 text-center text-lg" placeholder="🌍 Speak or type any command to the Global OS... (try: 'show satellites', 'open social', 'launch game mode')">

  <script>
    function resetOS() { if(confirm('Global OS Hard Reset?')) location.reload(); }
    function activatePilot() { alert('🚨 GLOBAL PILOT ONLINE\n300 drones protecting all friendly players on the globe\nAttack detection active • Game mode engaged'); }
    function populate() { alert('🌐 Crawlers flooding the globe with real internet data. All systems now fully operational as the ultimate Global Internet Operating System.'); }
    console.log('🚀 ASTRANOV GLOBAL INTERNET OPERATING SYSTEM v3.0 DEPLOYED — This is it, Captain.');
  </script>
</body>
</html>
